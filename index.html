<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>המזכירה האוטומטית של משחקי הקצב</title>
<meta name="theme-color" content="#16302a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="app-title"><h1>משחקי הקצב <span class="app-version">ג18</span></h1><p class="app-subtitle">המזכירה האוטומטית</p></div>
    <div class="header-right">
      <span id="connStatus" class="conn-status">●</span>
      <button id="settingsBtn" class="icon-btn" aria-label="הגדרות">⚙</button>
    </div>
  </header>

  <main>

    <section id="tab-record" class="tab-panel">
      <div id="queueBadgeWrap" class="queue-badge-wrap" hidden>
        <span id="queueBadge" class="queue-badge">0</span>
        <span>ממתין לשליחה</span>
      </div>

      <div class="mic-area">
        <button id="micBtn" class="mic-btn" aria-label="תמלול חי">
          <span id="micIcon">🎙️</span>
        </button>
        <p id="micStatus" class="mic-status">לחצו כדי לדבר</p>
        <button id="audioBtn" class="audio-btn">🔴 הקלטת אודיו בלבד (לתמלול מאוחר)</button>
      </div>

      <textarea id="transcript" class="transcript-box" placeholder="התמלול יופיע כאן... אפשר גם לערוך או להקליד ידנית"></textarea>

      <div class="action-row">
        <button id="sendBtn" class="btn btn-primary">שלח</button>
        <button id="discardBtn" class="btn btn-secondary">מחק</button>
      </div>

      <p id="sendNote" class="send-note"></p>
    </section>

    <section id="tab-inbox" class="tab-panel" hidden>
      <div class="inbox-toolbar">
        <button id="inboxRefresh" class="btn btn-secondary">🔄 רענן</button>
      </div>
      <div id="inboxStatus" class="inbox-status"></div>
      <div id="inboxList" class="inbox-list"></div>
    </section>

    <section id="tab-today" class="tab-panel" hidden>
      <div class="inbox-toolbar">
        <h2 id="todayTitle" class="today-title"></h2>
        <button id="todayRefresh" class="btn btn-secondary">🔄 רענן</button>
      </div>
      <div id="todayStatus" class="inbox-status"></div>
      <div id="todayList" class="today-list"></div>
      <div id="todayPendingWrap" hidden>
        <h3 class="today-subheading">⏳ ממתין למענה (חובה לסגור היום)</h3>
        <div id="todayPendingList" class="today-list"></div>
      </div>
    </section>

    <section id="tab-tasks" class="tab-panel" hidden>
      <div class="morning-row">
        <button id="morningBtn" class="btn btn-primary">☀️ בוקר טוב</button>
        <button id="snoozeBtn" class="btn btn-secondary">🔇 השתק להיום</button>
      </div>
      <div class="color-legend">
        <span><i class="dot dot-אדום"></i>היום</span>
        <span><i class="dot dot-כחול"></i>שגרה</span>
        <span><i class="dot dot-ירוק"></i>ספורט/כיף</span>
        <span><i class="dot dot-צהוב"></i>פתוח</span>
      </div>
      <div class="inbox-toolbar">
        <button id="tasksRefresh" class="btn btn-secondary">🔄 רענן</button>
      </div>
      <div id="tasksStatus" class="inbox-status"></div>
      <div id="tasksList" class="tasks-list"></div>
    </section>

  </main>

  <nav class="bottom-tabs">
    <button data-tab="record" class="tab-btn active">🎙️<span>הקלטה</span></button>
    <button data-tab="inbox" class="tab-btn">📥<span>ממתין</span><span id="inboxTabBadge" class="tab-badge" hidden>0</span></button>
    <button data-tab="today" class="tab-btn">📅<span>היום</span></button>
    <button data-tab="tasks" class="tab-btn">✅<span>משימות</span></button>
  </nav>

</div>

<button id="installBtn" class="install-btn" hidden>📲 התקן אפליקציה</button>

<div id="settingsModal" class="modal" hidden>
  <div class="modal-box">
    <h2>הגדרות שרת</h2>
    <p class="modal-hint">הפרטים כבר מחוברים ועובדים. שנו אותם רק אם קיבלתם כתובת שרת או קוד חדשים.</p>
    <label>כתובת שרת (Endpoint URL)
      <input id="endpointInput" type="url" placeholder="https://script.google.com/.../exec">
    </label>
    <label>קוד סודי (Token)
      <input id="tokenInput" type="text" placeholder="">
    </label>
    <div class="modal-actions">
      <button id="settingsSave" class="btn btn-primary">שמור</button>
      <button id="settingsClose" class="btn btn-secondary">סגור</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
